set -g default-terminal "tmux-256color"
set -ga terminal-features ",*:RGB"
set -s escape-time 0
set -g base-index 1
set -g renumber-windows on

unbind C-b
set-option -g prefix C-g
bind-key C-g send-prefix

# vi key movement for copy/pasta mode
set-window-option -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
set -g set-clipboard on
if-shell 'command -v pbcopy >/dev/null 2>&1' \
	"bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel pbcopy" \
	"bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'xclip -in -selection clipboard'"

bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"

bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

bind | split-window -h -c "#{pane_current_path}"
bind v split-window -v -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c split-window -h -c "#{pane_current_path}"
bind n new-window

bind -n C-f display-popup -E "tmux-sessionizer"
bind -n C-b switch-client -l

# Jump to the first agent window needing attention (waiting > done) across all
# sessions. pane-focus-in clears @agent_status on arrival, so repeated presses
# cycle through every flagged window.
bind -n C-s run-shell tmux-goto-waiting

set -g mouse on
set -g history-limit 50000

set -g status-left '[#S] '

# agent attention signalling: agent windows carry @agent_status (set by claude hooks
# via the agent-signal script). status-interval drives the cross-session aggregator;
# hooks also force an immediate redraw with refresh-client -S on every transition.
set -g status-interval 5

# Colour an inactive window by its agent status so the
# claude window lights up red/yellow while you are sitting in nvim.
set -g window-status-format '#{?#{==:#{@agent_status},waiting},#[bg=red fg=black],#{?#{==:#{@agent_status},done},#[bg=yellow fg=black],}} #I #W#F #[default]'

# Clear a window's agent status as soon as you focus it (you have now seen it).
# focus-events also improves nvim FocusGained/autoread behaviour.
set -g focus-events on
set-hook -g pane-focus-in 'set-option -uw @agent_status'

# Show agent status and session title in the right status area.
set -g status-right '#(agent-attention) #{?window_bigger,[#{window_offset_x}#,#{window_offset_y}] ,}"#{=21:pane_title}" %H:%M %d-%b-%y'
